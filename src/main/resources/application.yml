spring:
  application:
    name: erp-saas-backend
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_FILE_SIZE:15MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:20MB}
  datasource:
    url: jdbc:postgresql://localhost:5432/erp_saas
    username: ${DB_USERNAME:erp}
    password: ${DB_PASSWORD:erp}
    hikari:
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Production: use profile "prod" and see deploy/.env.docker.example. Never ship dev defaults.
app:
  reminders:
    cron: "0 0 2 * * *"
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:noreply@localhost}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
  jwt:
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  security:
    public-paths:
      - /api/v1/auth/login
      - /api/v1/auth/forgot-password
      - /api/v1/auth/reset-password
      - /actuator/health
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html

springdoc:
  swagger-ui:
    persistAuthorization: true

logging:
  level:
    com.erp: INFO
    org.springframework.security: INFO
